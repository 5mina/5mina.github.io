	 <title>Log-In</title>
	
     <style>
		html {
		  height: 100%;
		}
		
	     body {
		     background-image: url('ala.png');
		     background-repeat: no-repeat;
		     background-size: 100% 100%;
			 min-height: 100%;
	     }
		 
		 div.header{
		     font-family: 'Outfit';
		     background-color: white;
		     height: 90px;
			 width: 700px;
			 border-radius: 20px;
			 padding-top: 7px;
		     position: absolute;
			 left: 40px;
			 top: 40px;
			 opacity: 0.9;
		 }
		 
		 div.loginbox{
		     font-family: 'Quicksand';
			 background-color: white;
			 width: 550px;
			 height: 400px;
			 border-radius: 20px;
			 padding: 15px;
		     position: absolute;
			 left: 45px;
			 top: 180px;
			 opacity: 0.9;
		 }
		 
		 .loginbox li.search-box{
		     list-style-type: none;
             border-radius: 6px;
             cursor: pointer;
             transition: var(--tran-05);
		     width: 200px;
		 }

         .loginbox li.search-box input{
             height: 100%;
             background-color: var(--primary-color-light);
             color: var(--text-color);
             border-radius: 6px;
             font-size: 17px;
             font-weight: 500;
             transition: var(--tran-05);
			 width: 80%;
         }
		 
		 * {
             box-sizing: border-box;
         }

         input,
         .btn {
             width: 150px;
             height: 35px;
             padding: 12px;
             border-radius: 4px;
             margin: 0px;
             opacity: 1;
             display: inline-block;
             font-size: 20px;
             line-height: 1px;
             text-decoration: none; 
         }

         input:hover,
         .btn:hover {
             opacity: 1;
         }
		 
         .google {
		     background-color: #D3D3D3;
             color: black;
		     padding: 8px;
         }
		 
         .hide-md-lg {
             display: none;
         }

         @media screen and (max-width: 650px) {
             .col {
                 width: 100%;
                 margin-top: 0;
             }
         }
         .hide-md-lg {
             display: block;
             text-align: center;
         }
		 
     </style>	
</head> 

		<body>
             
             <div class="header">
                 <p style="font-size:45px;"><img src="https://cmc.pshs.edu.ph/images/logo-trans.png" alt="pisaylogo" style="width:70px; height:70px; margin-left:10px; padding:5px;">PSHS Knowledge Hub</p>
             </div>
	 
             <form>
             <div class="loginbox">	 
			     <div class="email">
		             <p style="font-size: 25px;"><b>Username</b></p>
	                     <li class="search-box" style="width: 100% !important; margin: 0px !important;">
                             <input type="email" placeholder="email" style="display:inline-block;vertical-align: middle;">
							 <button type="submit" style="display:inline-block;vertical-align: middle;"><i class="bx bxs-right-arrow-alt bx-md"></i></button>
                         </li>
	             </div>
	         
			 
	             <div class="password">
		             <p style="font-size:25px"><b>Password</b></p>
		                 <li class="search-box" style="width: 100% !important; margin: 0px !important;">
                             <input type="password" placeholder="password" style="display:inline-block;vertical-align:middle;">
                             <button type="submit" style="display:inline-block; vertical-align:middle;"><i class="bx bxs-right-arrow-alt bx-md"></i></button>
						 </li>
	             <p style="font-size:15px;"><b>Forgot username and password?</b></p>
				 </div>
				 </form>
				 
				 <hr>
                     <p style="font-family: 'Quicksand'; font-size:25px;"><b>Login using your account on:</b></p>
		             
					 <div class="col">
                         <a href="#" class="google btn">

						 <b>Google</b>
                         </a>
                     </div>
			     </hr>
			 </div>		 
		</body>
</html>
